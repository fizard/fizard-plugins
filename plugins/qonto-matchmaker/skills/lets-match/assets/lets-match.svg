<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B429D8"/>
      <stop offset="1" stop-color="#5B4CF0"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="1000" fill="url(#bg)"/>
  <!-- Heart formed by two Fizard-style bands meeting -->
  <g fill="none" stroke="#FFFFFF" stroke-width="92" stroke-linecap="butt">
    <!-- left band -->
    <path d="M 500 780 L 236 516 A 156 156 0 0 1 456 296 L 500 340"/>
    <!-- right band -->
    <path d="M 500 780 L 764 516 A 156 156 0 0 0 544 296 L 500 340"/>
  </g>
  <!-- spark -->
  <circle cx="768" cy="238" r="34" fill="#FFFFFF"/>
  <circle cx="852" cy="322" r="22" fill="#FFFFFF"/>
</svg>
