name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace and plugin manifests
        run: claude plugin validate .claude-plugin/marketplace.json

      - name: Codex manifest version matches CHANGELOG head
        run: |
          manifest_version=$(jq -r .version plugins/qonto-matchmaker/.codex-plugin/plugin.json)
          changelog_version=$(grep -m1 '^## ' CHANGELOG.md | sed -E 's/^## ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "manifest: $manifest_version — changelog head: $changelog_version"
          test "$manifest_version" = "$changelog_version"
